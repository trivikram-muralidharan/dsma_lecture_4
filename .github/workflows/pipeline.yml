  #         cache: "pip"

  #     - name: Install dependencies
  #       run: pip install -r requirements.txt

      # - name: Run data validation
      #   run: |
      #     python - <<'EOF'
      #     from src.validation import validate_nyc_taxi_parquet
      #     result = validate_nyc_taxi_parquet("data/raw/yellow_tripdata_2024-01.parquet")
      #     print(result)
      #     if not result["success"]:
      #         print("in the loop")
      #         failed = [r for r in result["results"] if not r["passed"]]
      #         print(f"Validation failed ({len(failed)} checks):")
      #         for r in failed:
      #             print(f"  • {r['name']}: {r['detail']}")
      #         raise SystemExit(1)
      #     print(f"Validation passed — {len(result['results'])} checks OK")
      #     EOF

  # ── Job 2: Train + drift detection ──────────────────────────────────────────
  train-and-detect:
    name: Train pipeline + detect drift
    runs-on: ubuntu-latest

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        run: python pipeline.py --wandb-project "${{ inputs.wandb_project || 'dsma-lecture4_tests' }}"

      # Upload generated outputs (plots, Evidently HTML report, processed data)
      # so you can download and inspect them from the Actions run page.
      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-outputs-${{ github.run_id }}
          path: |
            outputs/
            data/processed/dec_eval.parquet

      # Write a drift-detected flag that the next job can read.
      # pipeline.py exits normally whether or not drift was found, so we check
      # the Evidently HTML report as a proxy (it is only written in Step 9.1).
      - name: Check if drift report was produced
        id: drift-check
        run: |
          if [ -f "outputs/evidently_drift_report.html" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi

    outputs:
      drift_detected: ${{ steps.drift-check.outputs.drift_detected }}

  # ── Job 3: Notify on significant drift ──────────────────────────────────────
  # This job runs only when the pipeline detected drift and produced a report.
  # In production you would replace the echo with a Slack / email notification
  # or a call to an alerting webhook.
  notify-on-drift:
    name: Notify on drift detected
    needs: train-and-detect
    runs-on: ubuntu-latest
    if: needs.train-and-detect.outputs.drift_detected == 'true'

    steps:
      - name: Download pipeline outputs
        uses: actions/download-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_id }}

      - name: Send drift alert
        run: |
          echo "========================================"
          echo "  DRIFT DETECTED — mitigation was run"
          echo "  Check the W&B project for full metrics"
          echo "  Evidently report is in the artifacts"
          echo "========================================"
          # Production example:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H "Content-type: application/json" \
          #   --data '{"text": "Drift detected in NYC TLC pipeline. Check W&B."}'
