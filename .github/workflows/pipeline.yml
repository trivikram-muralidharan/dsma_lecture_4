# NYC TLC — ML Pipeline CI/CD
# ==============================
#
# This workflow demonstrates how a production ML pipeline can be automated
# so that when new data arrives, drift is detected and mitigation is triggered
# without any manual intervention.
#
# Triggers
# --------
#   push to main  — runs whenever pipeline code or raw data files are updated
#   schedule      — runs every Monday at 07:00 UTC to check for drift on the
#                   latest data, regardless of code changes
#
# Jobs
# ----
#   validate         → data quality gate before any training runs
#   train-and-detect → full pipeline (Steps 1–9.1), logs to W&B
#   mitigate         → Step 10 only if drift was detected (conditional job)
#
# Setup required
# --------------
#   1. Add WANDB_API_KEY to your repository Secrets
#      (Settings → Secrets and variables → Actions → New repository secret)
#   2. Place raw parquet files in data/raw/ or configure a data-fetch step
#      to download them from cloud storage (S3, GCS, Azure Blob, etc.)

name: ML Pipeline — Drift Monitoring

on:
  workflow_dispatch: # This line enables the manual "Run workflow" button
    inputs:
      wandb_project:
        description: 'W&B project name to log runs into'
        required: false
        default: 'dsma-lecture4_tests'
      reason:
        description: 'Reason for running'
        required: false
        default: 'Manual trigger'
  push:
    branches: [main]
    paths:
      - "data/raw/**.parquet"   # new data landed
      - "src/**.py"             # module changed
      - "pipeline.py"           # orchestration changed
      - "requirements.txt"      # dependency changed
  schedule:
    - cron: "0 7 * * 1"         # every Monday at 07:00 UTC

jobs:

  # ── Job 1: Data validation ───────────────────────────────────────────────────
